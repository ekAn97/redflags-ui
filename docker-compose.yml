version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redflagui-app
    restart: always
    ports:
      - "${PORT}:8083"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      API_BASE_URL: "${API_BASE_URL}"
      APP_URL: ${APP_URL}
